model_list:
  - model_name: claude-*
    litellm_params:
      model: anthropic/claude-*
      api_key: os.environ/ANTHROPIC_UPSTREAM_KEY
  - model_name: gpt-*
    litellm_params:
      model: openai/gpt-*
      api_key: os.environ/OPENAI_UPSTREAM_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: sqlite:////var/lib/ai-fortress/litellm.db

litellm_settings:
  drop_params: true
  set_verbose: false
  max_budget: 100.0
  budget_duration: 30d
  request_timeout: 600
